<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Le Coin des Animaux - FLE A1</title>
    <style>
        :root {
            --seashell: #FFF4EB;       
            --wheat: #F6E0B6;          
            --powder-blue: #A6BCC9;    
            --french-blue: #3E4B8E;    
            --midnight-violet: #3D1534;
            --success: #2e7d32;
            --error: #c62828;
            --glass-bg: #ffffff;
            --neo-shadow: 0 20px 40px rgba(61, 21, 52, 0.06), 0 1px 3px rgba(0, 0, 0, 0.02);
            --hover-lift: 0 30px 60px rgba(61, 21, 52, 0.12);
        }

        *, *::before, *::after {
            box-shadow: none;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background-color: var(--seashell);
            color: var(--midnight-violet);
            margin: 0;
            padding: 50px 20px;
            direction: ltr;
            -webkit-font-smoothing: antialiased;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            padding: 50px 30px;
            background: linear-gradient(135deg, var(--midnight-violet) 0%, var(--french-blue) 100%);
            color: var(--seashell);
            border-radius: 32px;
            margin-bottom: 40px;
            box-shadow: 0 25px 50px rgba(61, 21, 52, 0.15);
        }

        header h1 { margin: 0; font-size: 3rem; font-weight: 800; letter-spacing: -1px; }
        header p { margin: 14px 0 0 0; opacity: 0.85; font-size: 1.2rem; font-weight: 300; letter-spacing: 0.5px; }

        .navigation-dots {
            display: flex;
            justify-content: center;
            gap: 14px;
            margin-bottom: 40px;
        }

        .dot {
            width: 12px;
            height: 12px;
            background-color: var(--powder-blue);
            border-radius: 100px;
            pointer-events: none;
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            opacity: 0.4;
        }

        .dot.active {
            background-color: var(--french-blue);
            width: 40px;
            opacity: 1;
        }

        .page {
            display: none;
            background: var(--glass-bg);
            border-radius: 32px;
            padding: 50px;
            box-shadow: var(--neo-shadow);
            animation: modernSlideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1);
            min-height: 500px;
        }

        .page.active { display: block; }

        @keyframes modernSlideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .page-title {
            color: var(--midnight-violet);
            font-size: 2.2rem;
            font-weight: 800;
            margin-top: 0;
            margin-bottom: 30px;
            letter-spacing: -0.5px;
        }

        .form-group { margin-bottom: 25px; }
        .form-group label { display: block; margin-bottom: 10px; font-weight: 700; font-size: 1rem; color: var(--midnight-violet); }

            width: 100%;
            padding: 18px 20px;
            border: 2px solid transparent;
